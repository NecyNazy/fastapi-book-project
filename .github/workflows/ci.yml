name: CI Pipelines

on: 
  pull_request:
    branches:
      - main

jobs:
  test: 
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
         python-version: "3.7.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt # Ensure you have a requirement.txt file

      - name: Run tests with pytest
        run: pytest --maxfail=1 --disable-warning --tb=short

           
         
        
     
